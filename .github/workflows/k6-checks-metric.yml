name: k6 - checks-metric

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
#  schedule:                  commented out temporarily to no use cloud resources.
#    - cron: "0 3 * * 1" # weekly Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: k6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # PR run (no cloud upload; no secrets required)
      - name: Run checks-metric (PR)
        if: github.event_name == 'pull_request'
        uses: grafana/run-k6-action@v1
        with:
          path: ./performance-test/checks-metric.js

      # Main/scheduled run (uploads to k6 Cloud)
      - name: Run checks-metric (Cloud upload)
        if: github.event_name != 'pull_request'
        uses: grafana/run-k6-action@v1
        with:
          path: ./performance-test/checks-metric.js
          cloud-run-locally: true
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
