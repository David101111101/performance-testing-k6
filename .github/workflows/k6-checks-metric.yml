name: k6 - checks-metric

on:
  push:
    branches: [main]

jobs:
  run-k6:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run checks-metric.js (upload results to k6 Cloud)
        uses: grafana/run-k6-action@v1
        with:
          path: ./performance-test/checks-metric.js
          # cloud-run-locally defaults to true (runs in the GitHub runner and uploads results)
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
